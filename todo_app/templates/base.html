<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Удобный менеджер задач на Flask и SQLite">
  <title>{% block title %}Фокус — менеджер дел{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script defer src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('tasks.index') }}"><span>✓</span> Фокус</a>
    <div class="user-menu">
      {% if g.user %}
        <span class="username">{{ g.user.username }}</span>
        <form action="{{ url_for('auth.logout') }}" method="post">
          <button type="submit">Выйти</button>
        </form>
      {% else %}
        <a href="{{ url_for('auth.login') }}">Войти</a>
        <a href="{{ url_for('auth.register') }}">Регистрация</a>
      {% endif %}
      <button class="theme-button" id="theme-toggle" type="button" aria-label="Сменить тему">◐</button>
    </div>
  </header>
  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
